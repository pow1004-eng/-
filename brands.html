<title>퍼시스 · 브랜드 디렉토리</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#FAFAF8;color:#1C1917;font-size:15px;line-height:1.5}
:root{--g:#FAFAF8;--w:#FFFFFF;--t:#1C1917;--t2:#78716C;--t3:#A8A29E;--a:#C17F3E;--ab:rgba(193,127,62,.09);--abr:rgba(193,127,62,.22);--bd:#E8E4DF;--sh:0 1px 3px rgba(28,25,23,.07);--r:12px;--na:#3B82F6;--eu:#10B981;--jp:#EF4444;--kr:#C17F3E}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:216px;flex-shrink:0;background:var(--w);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:16px 14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bd)}
.sb-sub{font-size:12px;color:var(--t3);margin-top:2px}
.sb-srch{padding:10px;border-bottom:1px solid var(--bd)}
.sb-srch-in{display:flex;align-items:center;gap:7px;background:var(--g);border:1px solid var(--bd);border-radius:8px;padding:5px 9px}
.sb-srch-ic{color:var(--t3);font-size:13px}
.sb-srch input{border:none;background:none;outline:none;font-size:14px;color:var(--t);width:100%}
.sb-srch input::placeholder{color:var(--t3)}
.sb-nav{flex:1;padding:6px 8px}
.sb-grp{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:10px 8px 4px}
.sbl{display:flex;align-items:center;gap:9px;padding:7px 9px 7px 12px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:14px;font-weight:500;border:none;border-left:2.5px solid transparent;background:none;width:100%;text-align:left;text-decoration:none;transition:background .12s,color .12s}
.sbl:hover{background:var(--g);color:var(--t)}
.sbl.on{background:var(--ab);color:var(--a);border-left-color:var(--a);font-weight:600}
.sbl-ic{width:15px;text-align:center;font-size:15px;flex-shrink:0}
.sbl-cnt{margin-left:auto;background:var(--g);color:var(--t3);font-size:12px;font-weight:600;padding:1px 6px;border-radius:8px}
.sbl.on .sbl-cnt{background:var(--ab);color:var(--a)}
.sb-div{height:1px;background:var(--bd);margin:5px 4px}
.sb-user{padding:12px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:9px;margin-top:auto}
.sb-av{width:46px;height:46px;border-radius:50%;background:var(--a);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}.sb-av img{width:100%;height:100%;object-fit:cover;object-position:center top}
.sb-uname{font-size:14px;font-weight:600}
.sb-ubadge{font-size:9px;font-weight:600;background:var(--ab);color:var(--a);padding:1px 6px;border-radius:4px;display:inline-block;margin-top:2px}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{background:var(--w);border-bottom:1px solid var(--bd);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-t{font-size:16px;font-weight:700;letter-spacing:-.01em}
.tb-s{font-size:13px;color:var(--t3);margin-top:1px}
.cnt{flex:1;overflow-y:auto;padding:20px 22px 32px;display:flex;flex-direction:column;gap:24px}
/* REGION */
.reg-sec{display:flex;flex-direction:column;gap:12px}
.reg-hd{display:flex;align-items:center;gap:10px;padding:0 2px}
.reg-hd-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.reg-hd-name{font-size:16px;font-weight:700;letter-spacing:-.01em}
.reg-hd-count{font-size:12px;color:var(--t3);font-weight:500}
.reg-hd-line{flex:1;height:1px;background:var(--bd)}
/* BRAND CARD GRID */
.bdc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.bdc{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:16px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;color:inherit;box-shadow:var(--sh);transition:box-shadow .15s,border-color .15s;text-align:center}
.bdc:hover{box-shadow:0 4px 14px rgba(28,25,23,.09);border-color:#D8D3CC}
.bdc-av{width:40px;height:40px;border-radius:10px;overflow:hidden;flex-shrink:0}
.bdc-name{font-size:13px;font-weight:700;line-height:1.3;color:var(--t)}
.bdc-country{font-size:11px;color:var(--t3)}
.bdc-cat{font-size:11px;color:var(--t2);line-height:1.4;margin-top:1px}
.bdc-link{font-size:11px;font-weight:700;color:var(--a);margin-top:4px}
.bdc:hover .bdc-link{text-decoration:underline}
/* SEARCH FILTER */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap}
.fbtn{padding:5px 14px;border-radius:20px;border:1px solid var(--bd);background:var(--w);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.fbtn:hover,.fbtn.on{background:var(--ab);color:var(--a);border-color:var(--abr)}
</style>

function makeLogo(b, size) {
  var s = size || 40;
  var c = b.color || '#fff';
  var inner = '<rect width="'+s+'" height="'+s+'" fill="'+b.bg+'"/>';
  if (b.fursys) {
    return '<div class="bdc-av" style="background:#fff;border:1px solid #E8E4DF;display:flex;align-items:center;justify-content:center;padding:6px"><img src="data:image/png;base64,'+FURSYS_B64+'" style="height:14px;mix-blend-mode:multiply" alt="FURSYS"></div>';
  }
  if (b.dots) {
    inner += '<circle cx="'+(s*.72)+'" cy="'+(s*.2)+'" r="'+(s*.08)+'" fill="white" opacity="0.7"/>';
    inner += '<circle cx="'+(s*.85)+'" cy="'+(s*.38)+'" r="'+(s*.06)+'" fill="white" opacity="0.45"/>';
  }
  if (b.lines) {
    inner += '<text x="'+s/2+'" y="'+(s*.38)+'" text-anchor="middle" dominant-baseline="central" fill="'+c+'" font-size="'+(s*.22)+'" font-weight="300" font-family="Arial,sans-serif" letter-spacing="0.4">'+b.lines[0]+'</text>';
    inner += '<text x="'+s/2+'" y="'+(s*.63)+'" text-anchor="middle" dominant-baseline="central" fill="'+c+'" font-size="'+(s*.22)+'" font-weight="300" font-family="Arial,sans-serif" letter-spacing="0.4">'+b.lines[1]+'</text>';
  } else {
    inner += '<text x="'+s/2+'" y="'+s/2+'" text-anchor="middle" dominant-baseline="central" fill="'+c+'" font-size="'+b.fs+'" font-weight="'+(b.fw||'700')+'" font-family="Arial,sans-serif">'+b.mark+'</text>';
  }
  return '<div class="bdc-av"><svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg></div>';
}

function renderCard(b) {
  return '<a href="'+b.url+'" target="_blank" class="bdc" data-name="'+b.name.toLowerCase()+'">'
    + makeLogo(b, 40)
    + '<div class="bdc-name">'+b.name+'</div>'
    + '<div class="bdc-country">'+b.country+'</div>'
    + '<div class="bdc-cat">'+b.cat+'</div>'
    + '<div class="bdc-link">홈페이지 →</div>'
    + '</a>';
}

function render() {
  ['na','eu','jp','kr'].forEach(function(r) {
    document.getElementById('grid-'+r).innerHTML = BRANDS[r].map(renderCard).join('');
  });
}

function filterRegion(region, btn) {
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  ['na','eu','jp','kr'].forEach(function(r) {
    document.getElementById('sec-'+r).style.display = (region === 'all' || region === r) ? '' : 'none';
  });
}

function filterBrands(q) {
  var kw = q.toLowerCase().trim();
  document.querySelectorAll('.bdc').forEach(function(el) {
    el.style.display = (!kw || el.dataset.name.includes(kw)) ? '' : 'none';
  });
}

render();
</script>
