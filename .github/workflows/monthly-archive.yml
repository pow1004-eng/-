name: 월별 아카이브 (수동 전용)
# 자동 스케줄은 monthly-update.yml 에서 통합 처리
# 이 워크플로우는 수동으로 특정 월만 아카이브할 때 사용

on:
  workflow_dispatch:
    inputs:
      year:
        description: '아카이브할 연도 (비워두면 전월 자동)'
        required: false
      month:
        description: '아카이브할 월 (비워두면 전월 자동)'
        required: false

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run archive script
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ] && [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="${{ github.event.inputs.year }} ${{ github.event.inputs.month }}"
          fi
          python3 scripts/monthly_archive.py $ARGS

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ archive.html
          git diff --cached --quiet && echo "변경 없음" && exit 0
          PREV_LABEL=$(python3 -c "
from datetime import date, timedelta
d = date.today().replace(day=1) - timedelta(days=1)
print(f'{d.year}년 {d.month:02d}월')
")
          git commit -m "📦 ${PREV_LABEL} 월별 아카이브 자동 생성"
          git push
